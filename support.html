<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support - Carmesim</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; 
            line-height: 1.6; 
            color: #333; 
            max-width: 600px; 
            margin: 40px auto; 
            padding: 20px; 
            text-align: center; 
        }
        h1 { font-weight: 700; margin-bottom: 10px; color: #222; }
        p { color: #666; margin-bottom: 30px; }
        .contact-btn { 
            background-color: #A52A2A; /* Crimson shade */
            color: white; 
            padding: 14px 28px; 
            text-decoration: none; 
            border-radius: 10px; 
            font-weight: 600; 
            display: inline-block; 
            transition: background 0.2s, transform 0.1s; 
        }
        .contact-btn:hover { 
            background-color: #800000; 
            transform: translateY(-1px);
        }
        .links { margin-top: 20px; }
        .links a { 
            color: #A52A2A; 
            text-decoration: none; 
            font-size: 0.95em;
            margin: 0 10px;
        }
        .links a:hover { text-decoration: underline; }
        .footer { margin-top: 60px; font-size: 0.85em; color: #aaa; border-top: 1px solid #eee; padding-top: 20px; }
    </style>
</head>
<body>
    <h1>Carmesim Support</h1>
    <p>
        Need help with the hybrid board game or the app? 
        Whether it's a technical issue or a question about the rules, 
        feel free to reach out.
    </p>
    
    <a href="mailto:anabmota.abm@gmail.com" class="contact-btn">Contact Support</a>

    <div class="links">
        <a href="privacy.html">Privacy Policy</a>
    </div>

    <div class="footer">
        <p>&copy; 2026 Ana Beatriz Mota Ferreira. All rights reserved.</p>
        <p>Created for the hybrid gaming experience.</p>
    </div>
</body>
</html>
